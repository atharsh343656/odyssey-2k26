<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marthandam College of Engineering and Technology | ODYSSEY 2K26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .login-logo {
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 2rem;
            color: white;
            letter-spacing: 1px;
        }

        .login-logo i {
            color: var(--primary);
            width: 32px;
            height: 32px;
        }

        .login-logo span {
            color: var(--secondary);
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-heading);
            font-weight: 600;
        }

        .role-btn.active {
            background: rgba(255, 0, 85, 0.2);
            border-color: var(--primary);
            color: white;
        }

        .auth-form {
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        .error-msg {
            color: #ff3366;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        /* Background Glows */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 1;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 250px;
            height: 250px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 20px;
            }

            .login-logo {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            .role-selector {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="login-container glass">
        <a href="index.html" class="login-logo">
            <i data-lucide="sparkles"></i>
            ODYSSEY<span>2K26</span>
        </a>
        <p
            style="color: var(--secondary); font-weight: 600; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase;">
            Marthandam College of Engineering and Technology</p>

        <p style="color: var(--text-secondary); margin-bottom: 25px;">Select your portal to continue</p>

        <div class="role-selector">
            <button class="role-btn active" id="btn-user"><i data-lucide="users"
                    style="width:16px; margin-right:5px; vertical-align:text-bottom;"></i> User</button>
            <button class="role-btn" id="btn-admin"><i data-lucide="shield"
                    style="width:16px; margin-right:5px; vertical-align:text-bottom;"></i> Admin</button>
        </div>

        <!-- User View -->
        <div id="user-view">
            <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 25px;">
                Enter the main website to explore events, register, and view the schedule as a Student or Participant.
            </p>
            <a href="gallery.html" class="btn btn-secondary" style="width: 100%; margin-bottom: 15px;">Certificates <i
                    data-lucide="image"></i></a>
            <a href="index.html" class="btn btn-secondary" style="width: 100%;">Enter Website <i
                    data-lucide="arrow-right"></i></a>
        </div>

        <!-- Admin View -->
        <form id="admin-view" class="auth-form" style="display: none;">
            <div id="error-msg" class="error-msg">Incorrect username or password.</div>

            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Dashboard <i
                    data-lucide="log-in"></i></button>

        </form>
    </div>

    <script>
        lucide.createIcons();

        const btnUser = document.getElementById('btn-user');
        const btnAdmin = document.getElementById('btn-admin');
        const userView = document.getElementById('user-view');
        const adminView = document.getElementById('admin-view');
        const errorMsg = document.getElementById('error-msg');

        btnUser.addEventListener('click', () => {
            btnUser.classList.add('active');
            btnAdmin.classList.remove('active');
            userView.style.display = 'block';
            adminView.style.display = 'none';
        });

        btnAdmin.addEventListener('click', () => {
            btnAdmin.classList.add('active');
            btnUser.classList.remove('active');
            adminView.style.display = 'block';
            userView.style.display = 'none';
        });

        adminView.addEventListener('submit', (e) => {
            e.preventDefault();
            const un = document.getElementById('username').value;
            const pw = document.getElementById('password').value;

            // Very simple auth for demo purposes
            if (un === 'admin' && pw === 'atharsh123a') {
                localStorage.setItem('odyssey_admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
